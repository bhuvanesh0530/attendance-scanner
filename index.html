<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Attendance Scanner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; min-height: 100vh; }
    .app-bar { background: #0b78ba; color: white; padding: 14px 16px;
      display: flex; align-items: center; gap: 10px;
      font-size: 18px; font-weight: 700; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
    .container { max-width: 480px; margin: 0 auto; padding: 16px; }
    .info-card { background: white; border-radius: 12px; padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 16px;
      display: flex; align-items: center; gap: 12px; }
    .avatar { width: 48px; height: 48px; background: #e8f4fd; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .member-name { font-weight: 700; font-size: 16px; color: #1a1a1a; }
    .member-uid  { font-size: 13px; color: #666; margin-top: 2px; }
    .step-card { background: white; border-radius: 12px; padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 14px; }
    .step-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .step-num { width: 28px; height: 28px; background: #0b78ba; color: white;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px; flex-shrink: 0; }
    .step-title { font-weight: 600; font-size: 15px; color: #333; }
    #qr-reader { width: 100%; border-radius: 8px; overflow: hidden;
      border: 2px dashed #0b78ba; background: #000; min-height: 240px; position: relative; }
    #qr-reader video { width: 100% !important; height: 240px !important;
      object-fit: cover; border-radius: 6px; }
    #qr-reader canvas { display: none; }
    .qr-placeholder { display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 240px; gap: 10px; }
    .qr-placeholder p { color: #aaa; font-size: 13px; text-align: center; padding: 0 12px; }
    .scan-result { background: #e8f5e9; border: 1px solid #4caf50; border-radius: 8px;
      padding: 10px 14px; display: none; align-items: center; gap: 8px; margin-top: 10px; }
    .scan-result.show { display: flex; }
    .scan-result span { color: #2e7d32; font-weight: 600; font-size: 14px; }
    .loc-status { padding: 10px 14px; border-radius: 8px; font-size: 14px;
      background: #fff3e0; border: 1px solid #ff9800; color: #e65100;
      display: flex; align-items: center; gap: 8px; }
    .loc-status.success { background: #e8f5e9; border-color: #4caf50; color: #2e7d32; }
    #camera-preview { width: 100%; border-radius: 8px; background: #000;
      max-height: 220px; object-fit: cover; display: none; }
    #photo-preview { width: 100%; border-radius: 8px; max-height: 220px;
      object-fit: cover; display: none; border: 2px solid #4caf50; }
    .camera-controls { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
    .btn { padding: 11px 18px; border: none; border-radius: 8px; cursor: pointer;
      font-size: 14px; font-weight: 600; display: inline-flex; align-items: center; gap: 7px; }
    .btn-primary   { background: #0b78ba; color: white; }
    .btn-secondary { background: #e0e0e0; color: #333; }
    .btn-warning   { background: #ff9800; color: white; }
    .btn-success { background: #2e7d32; color: white; width: 100%;
      justify-content: center; font-size: 16px; padding: 14px;
      border: none; cursor: pointer; border-radius: 8px; margin-top: 4px; }
    .btn-success:disabled { background: #bdbdbd; cursor: not-allowed; }
    .status-msg { text-align: center; padding: 12px; border-radius: 8px;
      font-weight: 600; display: none; margin-top: 12px; font-size: 13px; word-break: break-all; }
    .status-msg.success { display: block; background: #e8f5e9; color: #2e7d32; }
    .status-msg.error   { display: block; background: #ffebee; color: #c62828; }
    .progress-bar { width: 100%; height: 6px; background: #e0e0e0;
      border-radius: 3px; margin-top: 10px; display: none; }
    .progress-fill { height: 100%; background: #0b78ba; border-radius: 3px; transition: width 0.3s ease; }
    .error-box { background: #ffebee; border: 1px solid #ef9a9a; border-radius: 8px;
      padding: 12px 14px; margin-top: 8px; display: none; }
    .error-box p { color: #c62828; font-size: 13px; margin-bottom: 8px; }
    #manual-input-row { display: none; margin-top: 10px; gap: 8px; }
    #manual-input-row input { flex: 1; padding: 10px 12px; border: 1px solid #ccc;
      border-radius: 8px; font-size: 14px; }
    #manual-input-row button { padding: 10px 14px; background: #0b78ba; color: white;
      border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
  </style>
</head>
<body>
<div class="app-bar">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white"
       stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/>
    <path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
    <line x1="3" y1="12" x2="21" y2="12"/>
    <line x1="12" y1="3" x2="12" y2="7"/>
    <line x1="12" y1="17" x2="12" y2="21"/>
  </svg>
  Attendance Scanner
</div>

<div class="container">

  <div class="info-card">
    <div class="avatar">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#0b78ba" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </div>
    <div>
      <div class="member-name" id="display-name">Loading...</div>
      <div class="member-uid"  id="display-uid">Please wait...</div>
    </div>
  </div>

  <div class="step-card">
    <div class="step-header">
      <div class="step-num">1</div>
      <div class="step-title">Scan Training QR Code</div>
    </div>
    <div id="qr-reader">
      <div class="qr-placeholder" id="qr-placeholder">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#0b78ba" stroke-width="1.5">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/>
          <rect x="14" y="14" width="3" height="3"/><rect x="18" y="14" width="3" height="3"/>
          <rect x="14" y="18" width="3" height="3"/><rect x="18" y="18" width="3" height="3"/>
        </svg>
        <p id="qr-placeholder-text">Starting camera...</p>
      </div>
    </div>

    <div class="error-box" id="qr-error-box">
      <p id="qr-error-text">Camera could not be accessed.</p>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button class="btn btn-warning" onclick="retryQRScanner()">🔄 Retry Camera</button>
        <button class="btn btn-secondary" onclick="toggleManualInput()">⌨️ Enter Manually</button>
      </div>
    </div>

    <div id="manual-input-row">
      <input type="text" id="manual-training-input" placeholder="Type training name here..." />
      <button onclick="setManualTraining()">✔</button>
    </div>

    <div class="scan-result" id="scan-result">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
           stroke="#2e7d32" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      <span id="training-name-display">Training scanned!</span>
    </div>
  </div>

  <div class="step-card">
    <div class="step-header">
      <div class="step-num">2</div>
      <div class="step-title">Capture Location</div>
    </div>
    <div class="loc-status" id="loc-status">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      <span id="loc-text">Requesting location...</span>
    </div>
  </div>

  <div class="step-card">
    <div class="step-header">
      <div class="step-num">3</div>
      <div class="step-title">Take Attendance Photo</div>
    </div>
    <video id="camera-preview" autoplay playsinline></video>
    <img   id="photo-preview" alt="Captured photo">
    <div class="camera-controls">
      <button class="btn btn-primary" id="btn-open-camera" onclick="openCamera()">📷 Open Camera</button>
      <button class="btn btn-primary" id="btn-capture" onclick="capturePhoto()" style="display:none;">📸 Capture</button>
      <button class="btn btn-secondary" id="btn-retake" onclick="retakePhoto()" style="display:none;">🔄 Retake</button>
    </div>
  </div>

  <button class="btn-success" id="btn-submit" onclick="submitAttendance()" disabled>
    ✅ Submit Attendance
  </button>

  <div class="progress-bar" id="progress-bar">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>
  <div class="status-msg" id="status-msg"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<script>
  // ⚠️ REPLACE THIS WITH YOUR ATTENDANCE SCANNER DEPLOYMENT URL
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycby1fIDgteCJyxGyY-PnDO0TOeyBb6cxXqUvYAkPmJfbTmCwNDHIL54C4z0iTt0ApoHF/exec";

  const state = {
    name: "", uid: "", rowNum: 0,
    trainingName: "", lat: null, lng: null,
    timestamp: "", photoBase64: "", stream: null
  };

  let qrScanner = null;
  let scannerStarted = false;

  // ── ON LOAD: get ?row= from URL, fetch name+UID ──────────────────
  window.onload = async () => {
    const params = new URLSearchParams(window.location.search);
    const row = parseInt(params.get("row") || "0");
    state.rowNum = row;

    if (row > 0) {
      try {
        // Fetch name and UID from Apps Script via GET
        const res = await fetch(WEB_APP_URL + "?row=" + row);
        const json = await res.json();
        if (json.name) state.name = json.name;
        if (json.uid)  state.uid  = json.uid;
      } catch(err) {
        console.log("Fetch error:", err);
        // Try no-cors fallback — read from URL hash if Delivery script put it there
      }
    }

    document.getElementById("display-name").textContent = state.name || "Name not found";
    document.getElementById("display-uid").textContent  = state.uid  || "Check your ID card";

    getLocation();
    setTimeout(startQRScanner, 800);
  };

  // ── QR SCANNER ───────────────────────────────────────────────────
  async function startQRScanner() {
    if (scannerStarted) return;
    scannerStarted = true;

    document.getElementById("qr-placeholder-text").textContent = "Requesting camera...";
    document.getElementById("qr-error-box").style.display = "none";

    // Request permission first
    try {
      const test = await navigator.mediaDevices.getUserMedia({ video: true });
      test.getTracks().forEach(t => t.stop());
    } catch(err) {
      showQRError("Camera permission denied. Please allow camera and tap Retry.", err);
      return;
    }

    // Find rear camera
    let cameraId = null;
    try {
      const devices = await navigator.mediaDevices.enumerateDevices();
      const cams = devices.filter(d => d.kind === "videoinput");
      const rear = cams.find(d =>
        d.label.toLowerCase().includes("back") ||
        d.label.toLowerCase().includes("rear") ||
        d.label.toLowerCase().includes("environment")
      );
      // If only one camera, use it. If rear found, use it.
      if (rear) cameraId = rear.deviceId;
      else if (cams.length === 1) cameraId = cams[0].deviceId;
    } catch(e) {}

    try {
      document.getElementById("qr-placeholder").style.display = "none";
      qrScanner = new Html5Qrcode("qr-reader");

      // Wider qrbox = easier to scan
      const config = {
        fps: 15,
        qrbox: { width: 250, height: 250 },
        aspectRatio: 1.0,
        disableFlip: false
      };

      if (cameraId) {
        await qrScanner.start({ deviceId: { exact: cameraId } }, config, onQRSuccess, () => {});
      } else {
        try {
          await qrScanner.start({ facingMode: { exact: "environment" } }, config, onQRSuccess, () => {});
        } catch(e) {
          await qrScanner.start({ facingMode: "environment" }, config, onQRSuccess, () => {});
        }
      }
    } catch(err) {
      showQRError("Could not start camera: " + err.message, err);
    }
  }

  function onQRSuccess(text) {
    state.trainingName = text;
    document.getElementById("training-name-display").textContent = "✅ Training: " + text;
    document.getElementById("scan-result").classList.add("show");
    if (qrScanner) { qrScanner.stop().catch(() => {}); qrScanner = null; }
    checkSubmitReady();
  }

  function showQRError(msg, err) {
    console.error("QR:", err);
    scannerStarted = false;
    document.getElementById("qr-placeholder").style.display = "flex";
    document.getElementById("qr-placeholder-text").textContent = "Camera unavailable";
    document.getElementById("qr-error-text").textContent = msg;
    document.getElementById("qr-error-box").style.display = "block";
  }

  function retryQRScanner() {
    if (qrScanner) { qrScanner.stop().catch(() => {}); qrScanner = null; }
    document.getElementById("qr-reader").innerHTML =
      `<div class="qr-placeholder" id="qr-placeholder">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#0b78ba" stroke-width="1.5">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/>
        </svg>
        <p id="qr-placeholder-text">Starting camera...</p>
      </div>`;
    document.getElementById("qr-error-box").style.display = "none";
    scannerStarted = false;
    setTimeout(startQRScanner, 500);
  }

  function toggleManualInput() {
    const row = document.getElementById("manual-input-row");
    row.style.display = (row.style.display === "flex") ? "none" : "flex";
    if (row.style.display === "flex") document.getElementById("manual-training-input").focus();
  }

  function setManualTraining() {
    const val = document.getElementById("manual-training-input").value.trim();
    if (!val) { alert("Please enter a training name."); return; }
    onQRSuccess(val);
    document.getElementById("manual-input-row").style.display = "none";
    document.getElementById("qr-error-box").style.display = "none";
  }

  // ── LOCATION ─────────────────────────────────────────────────────
  function getLocation() {
    if (!navigator.geolocation) {
      document.getElementById("loc-text").textContent = "Geolocation not supported.";
      return;
    }
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        state.lat = pos.coords.latitude.toFixed(6);
        state.lng = pos.coords.longitude.toFixed(6);
        state.timestamp = new Date().toLocaleString("en-IN");
        document.getElementById("loc-status").classList.add("success");
        document.getElementById("loc-text").textContent = "📍 " + state.lat + ", " + state.lng;
        checkSubmitReady();
      },
      () => {
        document.getElementById("loc-text").textContent = "Location denied. Enable location and refresh.";
      },
      { enableHighAccuracy: true, timeout: 15000 }
    );
  }

  // ── PHOTO ─────────────────────────────────────────────────────────
  async function openCamera() {
    try {
      state.stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user", width: { ideal: 320 }, height: { ideal: 240 } }
      });
      const video = document.getElementById("camera-preview");
      video.srcObject = state.stream;
      video.style.display = "block";
      document.getElementById("btn-open-camera").style.display = "none";
      document.getElementById("btn-capture").style.display = "inline-flex";
    } catch(e) {
      alert("Camera denied. Please allow camera and try again.");
    }
  }

  function capturePhoto() {
    const video = document.getElementById("camera-preview");
    const canvas = document.createElement("canvas");
    canvas.width = 200; canvas.height = 150;
    canvas.getContext("2d").drawImage(video, 0, 0, 200, 150);
    const full = canvas.toDataURL("image/jpeg", 0.25);
    state.photoBase64 = full.split(",")[1];
    if (state.stream) state.stream.getTracks().forEach(t => t.stop());
    video.style.display = "none";
    const preview = document.getElementById("photo-preview");
    preview.src = full;
    preview.style.display = "block";
    document.getElementById("btn-capture").style.display = "none";
    document.getElementById("btn-retake").style.display = "inline-flex";
    checkSubmitReady();
  }

  function retakePhoto() {
    state.photoBase64 = "";
    document.getElementById("photo-preview").style.display = "none";
    document.getElementById("btn-retake").style.display = "none";
    document.getElementById("btn-open-camera").style.display = "inline-flex";
    checkSubmitReady();
  }

  // ── SUBMIT ────────────────────────────────────────────────────────
  function checkSubmitReady() {
    const ready = state.trainingName && state.lat && state.photoBase64;
    document.getElementById("btn-submit").disabled = !ready;
  }

  function setProgress(pct, text) {
    document.getElementById("progress-bar").style.display = "block";
    document.getElementById("progress-fill").style.width = pct + "%";
    document.getElementById("btn-submit").textContent = text;
  }

  async function postToScript(payload) {
    const res = await fetch(WEB_APP_URL, {
      method: "POST", redirect: "follow", body: JSON.stringify(payload)
    });
    const text = await res.text();
    try { return JSON.parse(text); }
    catch(e) {
      const m = text.match(/\{"success"[\s\S]*?\}/);
      if (m) return JSON.parse(m[0]);
      throw new Error("Server error: " + text.substring(0, 150));
    }
  }

  async function submitAttendance() {
    const btn = document.getElementById("btn-submit");
    const msg = document.getElementById("status-msg");
    btn.disabled = true;
    msg.style.display = "none";

    try {
      setProgress(30, "Saving attendance...");
      const res1 = await postToScript({
        name: state.name || "Unknown",
        uid:  state.uid  || "Unknown",
        lat:  state.lat  || "0",
        lng:  state.lng  || "0",
        timestamp:    state.timestamp    || new Date().toLocaleString("en-IN"),
        trainingName: state.trainingName || "Unknown"
      });
      if (!res1.success) throw new Error(res1.error || "Failed to save");

      setProgress(70, "Uploading photo...");
      try {
        await postToScript({
          type: "photo", rowNum: res1.rowNum,
          uid: state.uid, photo: state.photoBase64
        });
      } catch(pe) { console.log("Photo upload failed:", pe.message); }

      setProgress(100, "Done!");
      setTimeout(() => {
        document.getElementById("progress-bar").style.display = "none";
        msg.className = "status-msg success";
        msg.textContent = "✅ Attendance recorded! You may close this page.";
        btn.style.display = "none";
      }, 500);

    } catch(e) {
      document.getElementById("progress-bar").style.display = "none";
      msg.className = "status-msg error";
      msg.textContent = "❌ ERROR: " + e.message;
      msg.style.display = "block";
      btn.disabled = false;
      btn.textContent = "Retry Submit";
    }
  }
</script>
</body>
</html>
